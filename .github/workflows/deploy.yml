name: Deploy Bun App to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client (Local)
        run: bunx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ~/Lottery-Backend

            # 1. Pull the latest source code
            git pull origin main

            # 2. Install production dependencies
            ~/.bun/bin/bun install --production

            # 3. BUILD THE PROJECT
            # This updates the dist/ folder with your new code
            ~/.bun/bin/bun run prod

            # 4. Export environment variables for Migrations
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export PORT="${{ secrets.PORT }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export X_API_KEY="${{ secrets.X_API_KEY }}"
            export DO_SPACES_BUCKET="${{ secrets.DO_SPACES_BUCKET }}"
            export DO_SPACES_ENDPOINT="${{ secrets.DO_SPACES_ENDPOINT }}"
            export DO_SPACES_KEY="${{ secrets.DO_SPACES_KEY }}"
            export DO_SPACES_REGION="${{ secrets.DO_SPACES_REGION }}"
            export DO_SPACES_SECRET="${{ secrets.DO_SPACES_SECRET }}"

            # 5. Run Prisma Migrations using the Bun binary
            ~/.bun/bin/bun prisma migrate deploy

            # 6. Force Restart PM2
            # We delete and start to ensure the new dist/server.js is loaded
            /usr/local/bin/pm2 delete edufund || true
            /usr/local/bin/pm2 start ecosystem.config.cjs --env production
            /usr/local/bin/pm2 save
